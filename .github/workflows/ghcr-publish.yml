# Publish container images to GitHub Container Registry (GHCR).
#
# Triggers: tag push (v* or phase*-wave*), main branch push, manual dispatch,
# and pull_request when the workflow / Dockerfile / src/** change.
# Push events build multi-arch (amd64 + arm64) and push to GHCR.
# pull_request events build single-arch (amd64) for Trivy scanning only —
# no push, so PR-builder images are never published to the registry.
#
# Notify-deploy is folded into this workflow as a dependent job so deploy
# only fires after the image is published successfully (push to main only).
# Replica of the isnad-graph#815 Contract v6 pattern landed in noorinalabs-isnad-graph
# commit b8931847 (2026-04-23). Tag emit shape is intentionally identical —
# see the `Extract metadata` step comment block for the Contract table.

name: Publish to GHCR

on:
  push:
    branches: [main]
    tags:
      - "v*"
      - "phase*-wave*"
  pull_request:
    paths:
      - .github/workflows/ghcr-publish.yml
      - Dockerfile
      - "src/**"
  workflow_dispatch:

concurrency:
  # event_name in the group key prevents PR runs from cancelling main pushes;
  # cancel-in-progress is enabled only for PRs so a force-push supersedes its scan.
  group: publish-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: noorinalabs/noorinalabs-user-service

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GHCR
        # Skipped on pull_request — PR runs do not push, so no registry creds
        # are exposed to PR-context jobs (which run with read-only GITHUB_TOKEN
        # for forks anyway, but keeping the step gated is defence-in-depth).
        if: github.event_name != 'pull_request'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag scheme (isnad-graph#815 Contract v6 = option C, 2026-04-23):
          #   sha-<short>   — immutable, one per push; written here on every event
          #   latest        — mutable pointer; written here on main + semver tags
          #   stg-<short>   — immutable per-push, stg namespace; written here ONLY
          #                   on push to main. Tag history = stg deploy log.
          #   stg-latest    — moving pointer to most-recent stg-<short>; written
          #                   here ONLY on push to main. Consumers pull this for
          #                   a stable target without chasing SHAs.
          #   prod-<short>  — immutable per-promotion, prod namespace; written by
          #                   deploy#84 ONLY, NOT this file. Tag history = promotion log.
          #   prod-latest   — moving pointer; written by deploy#84 ONLY.
          # deploy#84 writes both prod-* tags in one `docker buildx imagetools
          # create` invocation — registry-side manifest rewrite, no rebuild.
          #
          # Per-spec replica of noorinalabs-isnad-graph commit b8931847 (Linh Pham).
          # Canonical Contract: https://github.com/noorinalabs/noorinalabs-isnad-graph/issues/815#issuecomment-4301538921
          tags: |
            # Git tag (e.g., v1.2.3 or phase12-wave1)
            type=ref,event=tag
            # Short SHA (e.g., sha-a1b2c3d) — also emitted on PR for the
            # local image ref Trivy scans. IMMUTABLE anchor on every event.
            type=sha,prefix=sha-,format=short
            # Latest only on main branch push or semver tags. The enable
            # expression already excludes pull_request (refs/pull/N/merge).
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
            # stg-<short> per-push in stg namespace — IMMUTABLE, push-to-main only
            type=sha,prefix=stg-,format=short,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            # stg-latest moving pointer — push-to-main only
            type=raw,value=stg-latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          # PRs build single-arch (amd64) and load into the local Docker daemon
          # so Trivy can scan by tag without pushing. Push events build the
          # full multi-arch matrix and push to the registry.
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve Trivy image reference
        id: scan_ref
        env:
          # Bind GHA expressions to env vars so the shell sees stable
          # variables rather than text-substituted values — closes the
          # script-injection sink Idris flagged on PR #87 review (Q2).
          # Same env-var idiom used in the `Summary` step below.
          EVENT_NAME: ${{ github.event_name }}
          META_TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_FQN: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            # PR: image is loaded locally (push: false). Reference the first
            # tag the metadata-action emitted (the sha-<short> tag, which is
            # always present per the tags: config above).
            FIRST_TAG=$(printf '%s' "$META_TAGS" | head -n1)
            echo "ref=$FIRST_TAG" >> "$GITHUB_OUTPUT"
          else
            # Push/tag: scan by registry digest — race-free post-push (W8 #111
            # + user-service#61 retro). metadata-action emits :latest, :sha-*,
            # and (on main) :stg-* + :stg-latest — never :main. Digest is the
            # one stable handle across all of them.
            echo "ref=${IMAGE_FQN}@${BUILD_DIGEST}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          # Both paths block on CRITICAL/HIGH so PR Trivy failures gate the merge.
          image-ref: ${{ steps.scan_ref.outputs.ref }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Summary
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          IMAGE_FQN: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          GIT_SHA: ${{ github.sha }}
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            MODE="scan-only (PR — no push)"
            PLATFORMS="linux/amd64"
          else
            MODE="build + push"
            PLATFORMS="linux/amd64, linux/arm64"
          fi
          {
            echo "## GHCR Publish: ${{ job.status }}"
            echo ""
            echo "- **Mode:** $MODE"
            echo "- **Ref:** $REF_NAME"
            echo "- **Image:** $IMAGE_FQN"
            echo "- **Platforms:** $PLATFORMS"
            echo "- **SHA:** $GIT_SHA"
            echo "- **Digest:** $BUILD_DIGEST"
          } >> "$GITHUB_STEP_SUMMARY"

  # Fire repository_dispatch to noorinalabs-deploy AFTER the image is published.
  # Gated to main-branch pushes only — tag pushes, manual dispatches, and PRs
  # do NOT auto-deploy. The deploy workflow (deploy#84) consumes the SHA from
  # this payload to deploy the exact same image to stg that was just built.
  notify-deploy:
    name: Notify deploy repo
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger deploy repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_REPO_PAT }}
          repository: noorinalabs/noorinalabs-deploy
          event-type: deploy-noorinalabs-user-service
          client-payload: >-
            {
              "repo": "noorinalabs-user-service",
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref_name }}",
              "actor": "${{ github.actor }}"
            }
