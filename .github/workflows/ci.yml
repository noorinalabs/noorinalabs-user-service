name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - main
      - "deployments/**"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest

  pg-container-tests:
    name: Postgres container tests (RUN_PG_CONTAINER_TESTS)
    # The real-Postgres container tests (testcontainers + Docker) gated behind
    # RUN_PG_CONTAINER_TESTS=1 run NOWHERE in the default `check` job — it leaves
    # the flag unset so they skip (kept fast/deterministic). This job is their
    # automated home (#187): GitHub-hosted ubuntu runners ship a Docker daemon,
    # so testcontainers can start its own throwaway `postgres:16-alpine` — no
    # `services:` block needed. The tests still degrade to a SKIP (never a red
    # build) if Docker is unavailable, so this job is a strict superset of value.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --extra dev
      - name: Run real-Postgres container tests
        env:
          RUN_PG_CONTAINER_TESTS: "1"
          ENVIRONMENT: test
        run: >-
          uv run pytest
          tests/test_bootstrap_admin.py
          tests/test_oauth_account_linking_guard_pg.py
          -v

  openapi-snapshot-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --extra dev
      - name: Regenerate snapshot
        run: make openapi-snapshot
      - name: Check for drift
        run: git diff --exit-code docs/openapi-snapshot.json

  dockerfile-base-pin:
    name: Dockerfile base-image pin gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Enforce Base Image Pinning (tech-decisions.md § Base Image Pinning, #735/#744)
        # Every Dockerfile FROM must be digest-pinned AND carry the matching
        # distro upgrade. The checker is stdlib-only (no deps to install). This
        # job mirrors the `dockerfile-base-pin` pre-commit hook; the sync-drift
        # gate classifies the kind so the two sides cannot drift apart.
        run: python3 .claude/lib/check_dockerfile_base_pin.py Dockerfile

  precommit-ci-sync:
    name: Pre-commit ⇄ CI sync-drift gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run .claude/lib unit tests
        # Exercise the reusable charter-enforcement libs (pre_commit_ci_sync.py,
        # check_dockerfile_base_pin.py) and their tests. unittest-based + stdlib
        # only, so no dependency install is needed. testpaths=["tests"] in
        # pyproject excludes .claude from the app `check` job, so this is their
        # dedicated CI home (closes the pre-existing gap that they ran nowhere).
        run: python3 -m unittest discover -s .claude/lib/tests -p 'test_*.py'
      - name: Verify pre-commit config mirrors CI-enforced checks (#327)
        # Fails if a check the QUALITY-GATE CI workflows enforce
        # (ruff/mypy/pytest/actionlint/…) is missing from .pre-commit-config.yaml,
        # so local hooks can't silently drift behind CI. Scans BOTH PR-gate
        # workflows — ci.yml (code) AND docs.yml (markdown/config/actionlint) —
        # per the canonical org direction (parent #571/#572): docs.yml's
        # actionlint job is mirrored by the actionlint pre-commit hook, so the
        # gate stays green. ghcr-publish.yml is EXCLUDED: it is a release-time
        # container build/push (its `docker build` is not a local fast-feedback
        # check pre-commit should mirror), unlike the parent/landing repos whose
        # only workflows are quality gates. structural-ontology.yml IS included:
        # it is a quality gate (staleness check), so its `structural-ontology`
        # kind MUST be mirrored in pre-commit (#684 parity contract). This is the
        # user-service-specific deviation from a bare unscoped `.` invocation.
        run: >-
          python3 .claude/lib/pre_commit_ci_sync.py .
          --ci .github/workflows/ci.yml
          --ci .github/workflows/docs.yml
          --ci .github/workflows/structural-ontology.yml
