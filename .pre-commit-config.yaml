# Pre-commit hooks for noorinalabs-user-service
# Install:  uvx pre-commit install && uvx pre-commit install --hook-type pre-push
# Docs:     https://pre-commit.com/
#
# This MIRRORS .github/workflows/ci.yml (the `check` job) so a local commit/push
# fails fast instead of surfacing a lint/format/type/test error only after a PR
# is opened (Phase-3 end-state criterion #6 / noorinalabs-main#327). It replaces
# the older hand-rolled scripts/pre-commit.sh with the framework standard the
# org uses, so the pre-commit <-> CI sync-drift gate can verify the mirror.
#
# Stage split:
#   pre-commit (fast, every commit) — ruff-format, ruff-lint over the repo.
#   pre-push   (heavier, every push) — mypy strict + the pytest suite. These run
#     the whole src/ + tests surface, so they're push-time not commit-time to
#     keep the commit loop snappy while still catching everything before the
#     code leaves the machine.
#
# CI parity notes (user-service specifics, NOT the parent's .claude/ layout):
#   * CI runs `uv run ruff/pytest`; the heavier local hooks use `uv run` too so
#     the exact pinned tool versions from uv.lock run locally, never a stray
#     global ruff/mypy. ruff itself runs via the ruff-pre-commit mirror, pinned
#     to v0.15.11 to match the org sibling convention (isnad-graph / parent).
#   * actionlint mirrors the `Config — Workflow actionlint` job in docs.yml. The
#     sync-drift gate globs ALL workflow files, so a CI-enforced `actionlint`
#     kind not mirrored here would turn the gate red — this hook is what keeps
#     the (now unscoped) gate green (matches parent #571/#572 direction).
#   * pytest MUST run with ENVIRONMENT=test (the repo's test env-guard /
#     conftest require it); the entry sets it inline.
#   * mypy is run here at pre-push as STRICTER-LOCAL: it is configured in
#     pyproject (strict) and `make check` runs it, but ci.yml's `check` job does
#     NOT yet run mypy. The sync-drift gate treats stricter-local as
#     informational (never a gate failure), so keeping mypy here is safe and
#     catches type regressions before push. If CI later adds mypy, the mirror is
#     already in place.
#
# The kind-level mirror (ruff-lint, ruff-format, pytest, actionlint present on
# both sides) is enforced in CI by `.claude/lib/pre_commit_ci_sync.py`, which now
# scans ALL workflows (ci.yml + docs.yml) — if a future edit drops one side, that
# gate fails the build.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-format
        name: ruff-format
      - id: ruff
        args: [--fix]
        name: ruff-lint

  # actionlint mirrors docs.yml's `Config — Workflow actionlint` job so the
  # sync-drift gate (which globs all workflows) stays green. The upstream golang
  # hook builds a pinned actionlint and already scopes to ^.github/workflows/.
  # shellcheck MUST be on PATH so actionlint's embedded shellcheck integration
  # runs rather than silently skipping (feedback_actionlint_needs_shellcheck) —
  # CI gets it from ubuntu-latest's preinstalled shellcheck; locally, install
  # shellcheck before committing. Pinned v1.7.12 to match what CI's
  # download-actionlint.bash (tracking the latest release) resolves to.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        name: actionlint

  # cspell mirrors docs.yml's `Spellcheck (cspell)` job so the sync-drift gate
  # (which globs ALL workflows and now classifies the `cspell` kind — #684)
  # stays green. New domain vocabulary then fails `pre-commit run` locally
  # instead of only surfacing as a CI red after push. Pinned to v8.4.0 of
  # cspell-cli to match the exact cspell the
  # `streetsidesoftware/cspell-action@…v8.4.0` CI step bundles — same engine +
  # dictionaries on both sides. `language: node`, so pre-commit provisions its
  # own node/cspell env (no system cspell required).
  #
  # `files` is the regex equivalent of the CI action's authored-prose glob set
  # (CLAUDE.md, docs/**/*.md, the team charter); `--config .cspell.json` reuses
  # the same dictionaries + ignore rules CI loads, so a word that passes locally
  # passes in CI and vice-versa.
  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v8.4.0
    hooks:
      - id: cspell
        name: cspell
        args: ["--no-must-find-files", "--no-progress", "--no-summary", "--config", ".cspell.json"]
        files: ^(CLAUDE\.md|docs/.*\.md|\.claude/team/charter\.md)$

  # Charter-prose→code gate (noorinalabs-main#735, rolled out here by #744). Runs
  # `.claude/lib/check_dockerfile_base_pin.py` over this repo's Dockerfile,
  # mirroring the `dockerfile-base-pin` CI job in ci.yml (the sync-drift gate
  # classifies the `dockerfile-base-pin` kind, so this mirror is mandatory, not
  # optional). Commit-stage (a cheap static scan). `files:` scopes which paths
  # are candidates; the check itself self-filters (a scratch/exempt FROM passes).
  - repo: local
    hooks:
      - id: dockerfile-base-pin
        name: dockerfile-base-pin
        entry: python3 .claude/lib/check_dockerfile_base_pin.py
        language: system
        files: ((^|/)Dockerfile(\.[^/]+)?$|\.dockerfile$)
        pass_filenames: true

      # Structural ontology staleness gate (noorinalabs-main#194, C×T2 #820/#855).
      # Mirrors the `structural-ontology` CI workflow's `check` step: regenerates
      # the committed structural index (ontology/structural/{code-graph.json,
      # llms.txt}) with the OWNED generator in noorinalabs-main and fails if it
      # has drifted from the source tree. The generator is consumed from the
      # sibling noorinalabs-main checkout (auto-discovered via the standard org
      # layout, or $ONTOLOGY_GEN_LIB) — it is NOT vendored here. Both the
      # generator and this wrapper are stdlib-only, so `python3` runs it with no
      # uv/pip install. The `structural-ontology` sync-gate kind DEMANDS this
      # mirror exist (noorinalabs-main#684 parity contract). Regenerate with
      # `python3 scripts/structural_ontology.py emit` and commit the result.
      - id: structural-ontology-staleness
        name: structural-ontology-staleness
        entry: python3 scripts/structural_ontology.py check
        language: system
        pass_filenames: false
        files: ^(src/.*\.py|scripts/structural_ontology\.py|ontology/structural/.*)$
        stages: [pre-commit]

  # Heavier checks run at pre-push (mirror CI's pytest job + the strict mypy from
  # `make check`). Run as `local`/`system` hooks via `uv run` so the pinned
  # tools from uv.lock are used and never drift from CI.
  - repo: local
    hooks:
      - id: mypy
        name: mypy-strict (pre-push)
        entry: uv run mypy src/
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      - id: pytest
        name: pytest (pre-push)
        entry: env ENVIRONMENT=test uv run pytest -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
